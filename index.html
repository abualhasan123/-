<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موسوعة الطريقة السمانية - لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root{--p:#1a4a2e;--s:#2c5f2d;--a:#d4af37;--bg:#f4f7f4;--w:#fff;--danger:#d32f2f}
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Tajawal',sans-serif;background:var(--bg);color:#333;line-height:1.8}
        
        /* التحكم */
        .admin-nav{background:#222;color:#fff;padding:15px;position:sticky;top:0;z-index:1000;display:flex;justify-content:center;gap:15px;border-bottom:3px solid var(--a)}
        .btn-main{background:var(--a);color:var(--p);border:none;padding:10px 20px;border-radius:5px;font-weight:bold;cursor:pointer}
        
        header{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:4rem 1rem;text-align:center;border-bottom:6px solid var(--a)}
        .container{max-width:1100px;margin:30px auto;padding:0 15px}

        /* البطاقات والأقسام */
        .sec-card{background:var(--w);border-radius:12px;margin-bottom:20px;box-shadow:0 5px 15px rgba(0,0,0,0.05);border-right:8px solid var(--a);position:relative}
        .sec-header{padding:20px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:#fcfcfc}
        .sec-content{display:none;padding:20px;border-top:1px solid #eee}
        .sec-content.active{display:block}

        /* المواضيع والحذف */
        .topic-item{background:#fdfcf0;padding:15px;border-radius:8px;margin-bottom:15px;border:1px solid #eee;position:relative}
        .del-btn{position:absolute;top:10px;left:10px;color:var(--danger);cursor:pointer;font-size:1.2rem;transition:0.2s}
        .del-btn:hover{transform:scale(1.2)}

        .tree-box{background:#fff;padding:40px;border-radius:20px;text-align:center;border:2px solid var(--p)}
        footer{background:#111;color:#fff;padding:40px;text-align:center;margin-top:50px}
    </style>
</head>
<body>

<div class="admin-nav">
    <button class="btn-main" id="saveCloud"><i class="fas fa-save"></i> حفظ ونشر التغييرات</button>
    <button class="btn-main" style="background:var(--danger); color:white" id="resetData"><i class="fas fa-undo"></i> استعادة النسخة الأصلية</button>
</div>

<header>
    <h1 style="font-family:'Amiri'">موسوعة الطريقة السمانية الطيبية</h1>
    <p>بواسطة المهندس أبو الحسن محمد صالح محمد شريف</p>
</header>

<div class="container">
    
    <div id="encyclopediaContent">
        </div>

    <div class="tree-box" style="margin-top:40px">
        <h2><i class="fas fa-sitemap"></i> شجرة العائلة (قابلة للتعديل والحذف)</h2>
        <div id="familyTree" contenteditable="true" style="padding:20px">
            </div>
    </div>

</div>

<footer>
    <p>جميع الحقوق محفوظة لموسوعة الطريقة السمانية © 2026</p>
    <div style="margin-top:10px; color:var(--a)">إشراف: السجادة الطيبية بأم مرحي</div>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDwvZwG1Uaa8vCS51kfa0RCmM",
      authDomain: "encyclopedia-26a52.firebaseapp.com",
      projectId: "encyclopedia-26a52",
      storageBucket: "encyclopedia-26a52.appspot.com",
      messagingSenderId: "259021461993",
      appId: "1:259021461993:web:bd5c98d7cb11",
      databaseURL: "https://encyclopedia-26a52-default-rtdb.firebaseio.com/" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // نصوص منسوخة من المصادر (أزاهير الرياض) كقالب أولى
    const sourceTemplates = [
        "ذكر في كتاب أزاهير الرياض عن نشأة القطب الرباني...",
        "من رشفات المدام: أوراد الطريقة السمانية المعتمدة هي...",
        "مخطوطات أم مرحي تؤكد أن تسلسل السجادة بدأ من..."
    ];

    function createLayout() {
        let html = "";
        for(let i=1; i<=40; i++) {
            html += `
            <div class="sec-card" id="sec_${i}">
                <i class="fas fa-trash del-btn" onclick="deleteItem('sec_${i}')" title="حذف القسم بالكامل"></i>
                <div class="sec-header" onclick="toggleSec(this)">
                    <h3 contenteditable="true">القسم ${i}: (اضغط لتغيير العنوان)</h3>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div class="sec-content">
                    <div class="topic-item" id="topic_${i}_1">
                        <i class="fas fa-times-circle del-btn" onclick="deleteItem('topic_${i}_1')" title="حذف هذا الموضوع"></i>
                        <h4 contenteditable="true">موضوع من كتاب أزاهير الرياض</h4>
                        <p contenteditable="true">${sourceTemplates[i%3] || "اكتب تفاصيل الموضوع هنا..."}</p>
                    </div>
                    <button class="btn-main" onclick="addTopic(this)" style="font-size:0.8rem">+ إضافة موضوع جديد لهذا القسم</button>
                </div>
            </div>`;
        }
        document.getElementById('encyclopediaContent').innerHTML = html;
    }

    // وظائف التحكم
    window.toggleSec = (el) => el.nextElementSibling.classList.toggle('active');
    
    window.deleteItem = (id) => {
        if(confirm("هل أنت متأكد من حذف هذا العنصر؟ لا يمكن التراجع.")) {
            document.getElementById(id).remove();
        }
    };

    window.addTopic = (btn) => {
        const id = "topic_" + Math.random().toString(16).slice(2);
        const newItem = `
            <div class="topic-item" id="${id}">
                <i class="fas fa-times-circle del-btn" onclick="deleteItem('${id}')"></i>
                <h4 contenteditable="true">موضوع جديد</h4>
                <p contenteditable="true">محتوى جديد...</p>
            </div>`;
        btn.insertAdjacentHTML('beforebegin', newItem);
    };

    // حفظ البيانات
    document.getElementById('saveCloud').onclick = () => {
        const data = {
            main: document.getElementById('encyclopediaContent').innerHTML,
            tree: document.getElementById('familyTree').innerHTML
        };
        set(ref(db, 'encyclopedia/final_v3'), data).then(() => alert("تم حفظ كل التعديلات وحذف الأجزاء غير المرغوبة!"));
    };

    // جلب البيانات
    onValue(ref(db, 'encyclopedia/final_v3'), (snapshot) => {
        const d = snapshot.val();
        if(d) {
            document.getElementById('encyclopediaContent').innerHTML = d.main;
            document.getElementById('familyTree').innerHTML = d.tree;
        } else {
            createLayout();
        }
    });

</script>
</body>
</html>
