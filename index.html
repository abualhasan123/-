<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موسوعة الطريقة السمانية</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root{--p:#1a4a2e;--s:#2c5f2d;--a:#d4af37;--bg:#f8f9fa;--t:#1a1a1a;--w:#fff;--sh:0 10px 30px rgba(0,0,0,0.08)}
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--t);line-height:1.8;overflow-x:hidden}
        
        /* Header */
        header{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;padding:4rem 1rem;text-align:center;border-bottom:6px solid var(--a)}
        header h1{font-family:'Amiri',serif;font-size:3rem;margin-bottom:10px}
        .hdr-credits{background:rgba(255,255,255,0.1);padding:10px 25px;border-radius:50px;border:1px solid var(--a);display:inline-block;margin-top:15px}

        /* Control Panel for Admin */
        .admin-bar{background:#333;color:#fff;padding:10px;position:sticky;top:0;z-index:1001;display:flex;justify-content:center;gap:15px;border-bottom:2px solid var(--a)}
        .btn-save{background:var(--a);color:var(--p);border:none;padding:8px 20px;border-radius:5px;font-weight:bold;cursor:pointer}

        /* Sections Grid */
        .container{max-width:1400px;margin:0 auto;padding:30px 15px}
        .section-box{background:var(--w);border-radius:15px;margin-bottom:25px;box-shadow:var(--sh);border-right:8px solid var(--a);overflow:hidden}
        .section-header{padding:20px;background:#f1f3f1;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
        .section-content{display:none;padding:20px;background:#fff}
        .section-content.active{display:block;animation:fadeIn 0.5s}
        .topic-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));gap:15px}
        .topic-item{background:#fdfcf6;border:1px solid #eee;border-radius:10px;padding:15px}

        /* Media & Family Tree */
        .special-section{background:var(--w);padding:30px;border-radius:20px;margin-bottom:40px;box-shadow:var(--sh)}
        .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));gap:15px;margin-top:20px}

        footer{background:#111;color:#fff;padding:50px 20px;text-align:center;margin-top:50px}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    </style>
</head>
<body>

<div class="admin-bar">
    <button class="btn-save" id="publishBtn"><i class="fas fa-cloud-upload-alt"></i> اعتماد ونشر التعديلات للجميع</button>
    <button class="btn-save" style="background:#444; color:white;" id="lockBtn"><i class="fas fa-lock"></i> قفل التعديل</button>
</div>

<header>
    <h1><i class="fas fa-mosque"></i> موسوعة الطريقة السمانية</h1>
    <p>بإشراف السجادة الطيبية بـ "أم مرحي"</p>
    <div class="hdr-credits"><i class="fas fa-laptop-code"></i> المهندس أبو الحسن محمد صالح محمد شريف</div>
</header>

<div class="container">
    
    <div id="sections-area">
        <h2 style="margin-bottom:20px; color:var(--p); border-right:5px solid var(--a); padding-right:15px;">الأقسام العلمية (40 قسم)</h2>
        <div id="dynamicSections"></div>
    </div>

    <div class="special-section" id="tree-area">
        <h3><i class="fas fa-sitemap"></i> شجرة العائلة (مساحة واسعة)</h3>
        <div id="familyRoot" contenteditable="true" style="min-height:200px; padding:20px; border:1px dashed var(--a); margin-top:15px;">
            اضغط هنا لرسم شجرة العائلة...
        </div>
    </div>

    <div class="special-section" id="media-area">
        <h3><i class="fas fa-photo-video"></i> الصور والتسجيلات</h3>
        <button class="btn-save" style="margin-top:10px;" onclick="document.getElementById('imgInp').click()">إضافة صورة</button>
        <input type="file" id="imgInp" hidden accept="image/*" onchange="previewImg(this)">
        <div id="galGrid" class="gallery-grid"></div>
    </div>

</div>

<footer>
    <div style="font-size:1.2rem; color:var(--a); font-weight:bold;">المهندس أبو الحسن محمد صالح محمد شريف</div>
    <p>© 2026 جميع الحقوق محفوظة لموسوعة الطريقة السمانية</p>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
      apiKey: "AIzaSyDwvZwG1Uaa8vCS51kfa0RCmM",
      authDomain: "encyclopedia-26a52.firebaseapp.com",
      projectId: "encyclopedia-26a52",
      storageBucket: "encyclopedia-26a52.appspot.com",
      messagingSenderId: "259021461993",
      appId: "1:259021461993:web:bd5c98d7cb11",
      databaseURL: "https://encyclopedia-26a52-default-rtdb.firebaseio.com/" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // توكن البوتات للموافقة
    const BOT_TOKENS = ["7538760205:AAFu66u-W_0N_2_9Y0L_K8D1_eW3L_9_eW3", "7903820253:AAF-tS0000000000000000000"];
    const CHAT_ID = "1537025816";

    // توليد الأقسام الـ 40 والمواضيع الـ 40 لكل قسم
    function initApp() {
        const area = document.getElementById('dynamicSections');
        let html = "";
        for(let s=1; s<=40; s++) {
            let topics = "";
            for(let t=1; t<=40; t++) {
                topics += `<div class="topic-item"><b contenteditable="true">موضوع ${t}</b><p contenteditable="true">التفاصيل...</p></div>`;
            }
            html += `
                <div class="section-box">
                    <div class="section-header" onclick="this.nextElementSibling.classList.toggle('active')">
                        <h3>القسم ${s}: (اضغط للتعديل)</h3>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="section-content">
                        <div class="topic-grid">${topics}</div>
                    </div>
                </div>`;
        }
        area.innerHTML = html;
    }

    // نشر التعديلات وإرسال تقرير للبوت
    document.getElementById('publishBtn').onclick = function() {
        const data = {
            sections: document.getElementById('dynamicSections').innerHTML,
            tree: document.getElementById('familyRoot').innerHTML,
            gallery: document.getElementById('galGrid').innerHTML,
            lastUpdate: new Date().toLocaleString()
        };

        set(ref(db, 'encyclopedia/data'), data).then(() => {
            alert("تم الحفظ العالمي! جاري إرسال تقرير للمشرفين...");
            sendToBot("تم تحديث محتوى الموسوعة بنجاح بواسطة المهندس أبو الحسن.");
        });
    };

    function sendToBot(msg) {
        BOT_TOKENS.forEach(token => {
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
        });
    }

    // تحميل البيانات تلقائياً
    onValue(ref(db, 'encyclopedia/data'), (snapshot) => {
        const d = snapshot.val();
        if(d) {
            document.getElementById('dynamicSections').innerHTML = d.sections;
            document.getElementById('familyRoot').innerHTML = d.tree;
            document.getElementById('galGrid').innerHTML = d.gallery;
        } else {
            initApp();
        }
    });

    // معاينة الصور
    window.previewImg = function(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = `<div style="height:100px; background:url(${e.target.result}) center/cover; border-radius:10px;"></div>`;
                document.getElementById('galGrid').innerHTML += img;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // قفل التعديل
    document.getElementById('lockBtn').onclick = function() {
        const edits = document.querySelectorAll('[contenteditable="true"]');
        edits.forEach(e => e.contentEditable = e.contentEditable === "true" ? "false" : "true");
        this.innerHTML = edits[0].contentEditable === "true" ? '<i class="fas fa-lock"></i> قفل التعديل' : '<i class="fas fa-unlock"></i> فتح التعديل';
    };
</script>

</body>
</html>
